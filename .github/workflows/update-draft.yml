name: Update draft intelligence

on:
  schedule:
    - cron: "0 4 * * 1" # раз в неделю, понедельник 04:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-draft
  cancel-in-progress: false

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build draft intelligence (hero pools & counters)
        run: npm run build-draft

      - name: Commit updated draft data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data
          if git diff --staged --quiet; then
            echo "Нет изменений."
          else
            git commit -m "chore: auto-update draft intelligence [skip ci]"
            git push
          fi
