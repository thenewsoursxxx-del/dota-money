name: Update matches & ratings

on:
  schedule:
    - cron: "0 */6 * * *" # каждые 6 часов
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-matches
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Refresh Tier-1 ratings & timing (OpenDota)
        run: npm run build-data

      - name: Fetch upcoming Tier-1 matches (Liquipedia)
        run: npm run fetch-upcoming

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data
          if git diff --staged --quiet; then
            echo "Нет изменений."
          else
            git commit -m "chore: auto-update matches & ratings [skip ci]"
            git push
          fi
